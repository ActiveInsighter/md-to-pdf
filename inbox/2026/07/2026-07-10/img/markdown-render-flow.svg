<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300">
  <rect width="1000" height="300" fill="#ffffff"/>
  <style>
    .box { fill: #f7f7f8; stroke: #9ca3af; stroke-width: 2; rx: 16; }
    .title { font: 600 28px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #202123; text-anchor: middle; }
    .sub { font: 18px 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif; fill: #6b7280; text-anchor: middle; }
    .arrow { stroke: #6b7280; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="85" width="200" height="130"/>
  <text class="title" x="140" y="140">Markdown</text>
  <text class="sub" x="140" y="180">文本与结构</text>
  <path class="arrow" d="M 255 150 L 365 150"/>
  <rect class="box" x="380" y="85" width="240" height="130"/>
  <text class="title" x="500" y="140">HTML + CSS</text>
  <text class="sub" x="500" y="180">KaTeX / Shiki</text>
  <path class="arrow" d="M 635 150 L 745 150"/>
  <rect class="box" x="760" y="85" width="200" height="130"/>
  <text class="title" x="860" y="140">PDF</text>
  <text class="sub" x="860" y="180">Chromium 打印</text>
</svg>
