    <rect x="390" y="40" width="90" height="48" class="box"/><text x="435" y="70" text-anchor="middle">显卡</text><line x1="435" y1="88" x2="435" y2="135" class="line"/>
    <rect x="530" y="40" width="110" height="48" class="box"/><text x="585" y="70" text-anchor="middle">磁盘接口</text><line x1="585" y1="88" x2="585" y2="135" class="line"/>
    <rect x="110" y="190" width="90" height="48" class="box"/><text x="155" y="220" text-anchor="middle">BIOS</text><line x1="155" y1="190" x2="155" y2="135" class="line"/>
    <rect x="250" y="190" width="90" height="48" class="box"/><text x="295" y="220" text-anchor="middle">计时器</text><line x1="295" y1="190" x2="295" y2="135" class="line"/>
