<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc" data-regression="pdf-renderer">
  <title id="title">PDF renderer regression diagram</title>
  <desc id="desc">Automated Markdown to HTML to Chromium to PDF regression pipeline.</desc>
  <rect width="900" height="320" fill="#ffffff"/>
  <g fill="#f7f8fa" stroke="#d4d9e2" stroke-width="2">
    <rect x="40" y="105" width="170" height="90" rx="14"/>
    <rect x="260" y="105" width="170" height="90" rx="14"/>
    <rect x="480" y="105" width="170" height="90" rx="14"/>
    <rect x="700" y="105" width="160" height="90" rx="14"/>
  </g>
  <g font-family="sans-serif" font-size="26" fill="#20252d" text-anchor="middle">
    <text x="125" y="160">Markdown</text>
    <text x="345" y="160">HTML/CSS</text>
    <text x="565" y="160">Chromium</text>
    <text x="780" y="160">PDF</text>
  </g>
  <g stroke="#67707d" stroke-width="4" fill="none">
    <path d="M210 150 H250"/>
    <path d="M430 150 H470"/>
    <path d="M650 150 H690"/>
  </g>
</svg>
