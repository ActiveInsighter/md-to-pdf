name: Build Obsidian Style PDF

on:
  push:
    branches:
      - main
    paths:
      - 'inbox/**/manifest.yml'
      - 'inbox/**/manifest.yaml'
      - 'inbox/**/manifest.json'
      - 'inbox/**/md/**'
      - 'inbox/**/img/**'
      - 'inbox/**/attachments/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'queue | day | single | notes | validate'
        required: true
        default: 'queue'
      source:
        description: 'Manifest path, Markdown path, or day target depending on mode'
        required: false
      day:
        description: 'Day like 2026-07-02, used by day/validate mode'
        required: false
      publish_output_branch:
        description: 'Publish generated files to the output branch'
        required: true
        default: 'true'
      consume_after_success:
        description: 'Delete inbox jobs whose manifest says consume.delete_after_success=true'
        required: true
        default: 'true'

concurrency:
  group: md-to-pdf-build-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PDF_POSTPROCESS_STRICT: 'true'
      PDF_PREVIEW_DPI: '110'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Record run start
        run: node scripts/record-run-state.mjs start

      - name: Commit run start
        continue-on-error: true
        run: node scripts/git-commit-state.mjs "Record workflow start [skip ci]"

      - name: Install dependencies, fonts, Chrome, and PDF tools
        run: |
          set -o pipefail
          mkdir -p .github
          : > .github/latest-build-log.txt
          echo "## apt install CJK fonts and Poppler" | tee -a .github/latest-build-log.txt
          sudo apt-get update 2>&1 | tee -a .github/latest-build-log.txt
          sudo apt-get install -y fonts-noto-cjk poppler-utils 2>&1 | tee -a .github/latest-build-log.txt
          fc-cache -f 2>&1 | tee -a .github/latest-build-log.txt
          echo "" | tee -a .github/latest-build-log.txt
          echo "## npm ci" | tee -a .github/latest-build-log.txt
          npm ci 2>&1 | tee -a .github/latest-build-log.txt
          echo "" | tee -a .github/latest-build-log.txt
          echo "## Chrome setup" | tee -a .github/latest-build-log.txt
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome executable was not found on the runner." | tee -a .github/latest-build-log.txt
            exit 1
          fi
          echo "Using system Chrome: $CHROME_PATH" | tee -a .github/latest-build-log.txt
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Build PDF queue
        id: build_pdf
        continue-on-error: true
        env:
          BUILD_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'queue' }}
          BUILD_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.source || '' }}
          BUILD_DAY: ${{ github.event_name == 'workflow_dispatch' && inputs.day || '' }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: npm run ci:build

      - name: Upload PDF artifact
        id: upload_artifact
        if: steps.build_pdf.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: obsidian-style-pdf
          path: |
            dist/**
            .github/latest-build-log.txt
            .github/last-build-summary.json
            .github/latest-output.json
          if-no-files-found: error

      - name: Publish output branch
        id: publish_output
        if: steps.build_pdf.outcome == 'success'
        continue-on-error: true
        env:
          OUTPUT_BRANCH: output
          PUBLISH_OUTPUT_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_output_branch || 'true' }}
        run: node scripts/publish-output-branch.mjs

      - name: Consume processed inbox jobs
        id: consume_queue
        if: steps.build_pdf.outcome == 'success' && steps.publish_output.outcome == 'success' && (github.event_name != 'workflow_dispatch' || inputs.consume_after_success == 'true')
        continue-on-error: true
        run: |
          node scripts/consume-queue.mjs
          node scripts/git-commit-all.mjs "Consume processed inbox jobs [skip ci]"

      - name: Record run finish
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_pdf.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_output.outcome }}
          CONSUME_OUTCOME: ${{ steps.consume_queue.outcome }}
        run: node scripts/record-run-state.mjs finish

      - name: Commit run finish
        if: always()
        continue-on-error: true
        run: node scripts/git-commit-state.mjs "Record workflow finish [skip ci]"

      - name: Fail if transaction failed
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build_pdf.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_output.outcome }}
          CONSUME_OUTCOME: ${{ steps.consume_queue.outcome }}
        run: |
          if [ "$BUILD_OUTCOME" != "success" ]; then
            echo "PDF build failed: $BUILD_OUTCOME"
            exit 1
          fi
          if [ "$ARTIFACT_OUTCOME" != "success" ]; then
            echo "Artifact upload failed: $ARTIFACT_OUTCOME"
            exit 1
          fi
          if [ "$PUBLISH_OUTCOME" != "success" ]; then
            echo "Output publish failed: $PUBLISH_OUTCOME"
            exit 1
          fi
          if [ "$CONSUME_OUTCOME" != "success" ] && [ "$CONSUME_OUTCOME" != "skipped" ]; then
            echo "Queue consume failed: $CONSUME_OUTCOME"
            exit 1
          fi
