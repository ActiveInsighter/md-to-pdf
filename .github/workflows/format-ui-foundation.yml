name: Format UI foundation

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/format-ui-foundation.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Mark UI formatting pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'ui-foundation-formatting',
              target_url: runUrl,
              description: 'Formatting UI foundation styles',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Format UI stylesheet
        working-directory: frontend
        run: npx prettier --write src/styles.css

      - name: Validate UI foundation
        working-directory: frontend
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit formatted stylesheet and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/format-ui-foundation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/src/styles.css .github/workflows/format-ui-foundation.yml
          if git diff --cached --quiet; then
            echo 'No formatting changes to commit.'
          else
            git commit -m 'style: format accessible glassmorphism foundation'
            git push
          fi

      - name: Publish UI formatting result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'ui-foundation-formatting',
              target_url: runUrl,
              description: state === 'success' ? 'UI foundation formatted and validated' : 'UI foundation formatting failed',
            })
