name: Refresh frontend lock once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: refresh-frontend-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'chore/upgrade-dependencies-20260720'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout dependency branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Refresh frontend lockfile
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Commit frontend lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/package-lock.json
          if git diff --cached --quiet; then
            echo 'Frontend lockfile is already current.'
            exit 0
          fi
          git commit -m 'chore(frontend): refresh dependency lockfile'
          git push origin HEAD:${{ github.head_ref }}
