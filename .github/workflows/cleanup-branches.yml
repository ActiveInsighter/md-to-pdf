name: Refresh frontend lockfile

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'frontend/package.json'
      - '.github/workflows/cleanup-branches.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-frontend-lock-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.ref == 'agent/frontend-architecture-refactor' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: agent/frontend-architecture-refactor
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Generate lockfile without lifecycle scripts
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile through GitHub API
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          TARGET_BRANCH: agent/frontend-architecture-refactor
        with:
          script: |
            const fs = require('node:fs')
            const owner = context.repo.owner
            const repo = context.repo.repo
            const branch = process.env.TARGET_BRANCH
            const content = fs.readFileSync('frontend/package-lock.json', 'utf8')
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` })
            const commit = await github.rest.git.getCommit({ owner, repo, commit_sha: ref.data.object.sha })
            const blob = await github.rest.git.createBlob({ owner, repo, content, encoding: 'utf-8' })
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: commit.data.tree.sha,
              tree: [{ path: 'frontend/package-lock.json', mode: '100644', type: 'blob', sha: blob.data.sha }],
            })
            const next = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'chore: refresh frontend dependency lock',
              tree: tree.data.sha,
              parents: [ref.data.object.sha],
            })
            await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: next.data.sha })
