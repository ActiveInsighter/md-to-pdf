name: Cleanup expired Supabase PDF jobs

on:
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cleanup-supabase-pdf-jobs
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cleanup expired jobs
        run: node scripts/cleanup-supabase-pdf-jobs.mjs
