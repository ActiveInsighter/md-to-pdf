name: Cleanup expired Supabase PDF jobs

on:
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-supabase-pdf-jobs.yml'
      - 'scripts/http-retry.mjs'
      - 'scripts/test-http-retry.mjs'
      - 'scripts/cleanup-supabase-pdf-jobs.mjs'
      - 'scripts/test-cleanup-supabase-pdf-jobs.mjs'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: cleanup-supabase-pdf-jobs-${{ github.event_name == 'pull_request' && github.ref || 'production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate maintenance script syntax
        run: |
          node --check scripts/http-retry.mjs
          node --check scripts/test-http-retry.mjs
          node --check scripts/cleanup-supabase-pdf-jobs.mjs
          node --check scripts/test-cleanup-supabase-pdf-jobs.mjs

      - name: Run shared HTTP retry tests
        run: npm run test:http-retry

      - name: Run Supabase cleanup HTTP tests
        run: npm run test:cleanup-supabase

  cleanup:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Validate cleanup secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_STORAGE_BUCKET; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done
          [[ -n "${SUPABASE_SECRET_KEY:-}" || -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || {
            echo "Missing SUPABASE_SECRET_KEY or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          }
          node --check scripts/http-retry.mjs
          node --check scripts/cleanup-supabase-pdf-jobs.mjs

      - name: Cleanup expired jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
        run: node scripts/cleanup-supabase-pdf-jobs.mjs
