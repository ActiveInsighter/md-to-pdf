name: Build PDF API job
run-name: PDF API job ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: PDF job UUID
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pdf-api-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      JOB_ID: ${{ inputs.job_id }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PDF_MAX_MARKDOWN_BYTES: '10485760'
      PDF_MAX_ASSETS_BYTES: '52428800'
      PDF_MAX_EXTRACTED_BYTES: '209715200'
      PDF_MAX_EXTRACTED_FILES: '2000'
      PDF_MAX_EXTRACTED_FILE_BYTES: '26214400'
      PDF_MAX_PATH_LENGTH: '240'

    steps:
      - name: Checkout renderer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate job and secrets
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$JOB_ID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$ ]] || {
            echo "Invalid job_id format"
            exit 1
          }
          for name in SUPABASE_URL SUPABASE_STORAGE_BUCKET; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required secret: $name"
              exit 1
            }
          done
          [[ -n "${SUPABASE_SECRET_KEY:-}" || -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || {
            echo "Missing SUPABASE_SECRET_KEY (preferred) or SUPABASE_SERVICE_ROLE_KEY (legacy)"
            exit 1
          }

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore installed Node dependencies
        id: node-modules-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ runner.arch }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install Node dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        shell: bash
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Restore Noto CJK fonts
        id: cjk-font-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.local/share/fonts/noto-cjk
            ~/.cache/fontconfig
          key: noto-cjk-${{ runner.os }}-${{ runner.arch }}-ubuntu-24.04-v1

      - name: Install renderer system dependencies
        env:
          CJK_FONT_CACHE_HIT: ${{ steps.cjk-font-cache.outputs.cache-hit }}
        shell: bash
        run: |
          set -euo pipefail

          packages=()
          if [[ "$CJK_FONT_CACHE_HIT" != "true" ]]; then
            packages+=(fonts-noto-cjk)
          fi
          if ! command -v pdfinfo >/dev/null 2>&1; then
            packages+=(poppler-utils)
          fi

          if (( ${#packages[@]} > 0 )); then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends "${packages[@]}"
          fi

          if [[ "$CJK_FONT_CACHE_HIT" != "true" ]]; then
            SYSTEM_FONT_DIR=/usr/share/fonts/opentype/noto
            LOCAL_FONT_DIR="$HOME/.local/share/fonts/noto-cjk"

            [[ -d "$SYSTEM_FONT_DIR" ]] || {
              echo "Noto CJK system font directory was not found"
              exit 1
            }

            mkdir -p "$LOCAL_FONT_DIR"
            cp -a "$SYSTEM_FONT_DIR"/. "$LOCAL_FONT_DIR"/
            fc-cache -f "$LOCAL_FONT_DIR"
          else
            fc-cache "$HOME/.local/share/fonts/noto-cjk"
          fi

          FONT_MATCH="$(fc-match -f '%{family}\n' 'Noto Sans CJK SC')"
          [[ "$FONT_MATCH" == *"Noto Sans CJK"* ]] || {
            echo "Noto CJK fonts are not available after restore/install"
            echo "Resolved font: $FONT_MATCH"
            exit 1
          }
          echo "Resolved CJK font: $FONT_MATCH"

      - name: Resolve Chrome executable
        shell: bash
        run: |
          set -euo pipefail
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          [[ -n "$CHROME_PATH" ]] || {
            echo "Chrome executable not found"
            exit 1
          }
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Fetch and validate queued job
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work/input work/source work/logs dist
          node scripts/supabase-pdf-job.mjs get --output work/job.json
          JOB_STATUS="$(node -e 'const j=require("./work/job.json"); process.stdout.write(j.status)')"
          [[ "$JOB_STATUS" == "queued" ]] || {
            echo "Job is not queued; current status: $JOB_STATUS"
            exit 1
          }
          THEME="$(node -e 'const j=require("./work/job.json"); const t=String(j.theme||""); if(!/^[A-Za-z0-9][A-Za-z0-9._-]*$/.test(t)) process.exit(2); process.stdout.write(t)')"
          [[ -f "themes/${THEME}.css" ]] || {
            echo "Theme does not exist: $THEME"
            exit 1
          }
          echo "PDF_THEME=$THEME" >> "$GITHUB_ENV"

      - name: Mark building
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs status building

      - name: Mark input download
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs progress fetching-input

      - name: Download Markdown
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/supabase-pdf-job.mjs download-input --output work/input/input.md \
            2>&1 | tee work/logs/download-input.log

      - name: Download optional assets
        id: download
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/supabase-pdf-job.mjs download-assets \
            --output work/input/assets.zip \
            --github-output "$GITHUB_OUTPUT" \
            2>&1 | tee work/logs/download-assets.log

      - name: Mark source preparation
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs progress preparing-source

      - name: Prepare source safely
        env:
          HAS_ASSETS: ${{ steps.download.outputs.has_assets }}
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(
            --markdown work/input/input.md
            --work-dir work/source
            --max-markdown-bytes "$PDF_MAX_MARKDOWN_BYTES"
            --max-assets-bytes "$PDF_MAX_ASSETS_BYTES"
            --max-extracted-bytes "$PDF_MAX_EXTRACTED_BYTES"
            --max-files "$PDF_MAX_EXTRACTED_FILES"
            --max-file-bytes "$PDF_MAX_EXTRACTED_FILE_BYTES"
            --max-path-length "$PDF_MAX_PATH_LENGTH"
          )
          if [[ "$HAS_ASSETS" == "true" ]]; then
            ARGS+=(--assets work/input/assets.zip)
          fi
          python3 scripts/prepare-supabase-input.py "${ARGS[@]}"

      - name: Mark rendering
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs progress rendering

      - name: Render PDF
        shell: bash
        run: node scripts/build-pdf.mjs work/source/input.md dist/output.pdf --theme "$PDF_THEME"

      - name: Mark output validation
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs progress validating-output

      - name: Validate PDF
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/output.pdf
          [[ "$(head -c 4 dist/output.pdf)" == "%PDF" ]] || {
            echo "Invalid PDF header"
            exit 1
          }
          pdfinfo dist/output.pdf | tee dist/pdfinfo.txt

      - name: Mark uploading
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs status uploading

      - name: Upload PDF to Supabase Storage
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs upload-output --input dist/output.pdf

      - name: Mark completed
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs complete

      - name: Delete source objects after success
        continue-on-error: true
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: node scripts/supabase-pdf-job.mjs delete-inputs

      - name: Prepare sanitized failure diagnostic
        if: failure()
        shell: bash
        env:
          DIAGNOSTIC_RUN_ID: ${{ github.run_id }}
          DIAGNOSTIC_RUN_ATTEMPT: ${{ github.run_attempt }}
          DIAGNOSTIC_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p work/diagnostics
          node -e 'const fs=require("node:fs"); const body={schemaVersion:1,outcome:"failed",runId:process.env.DIAGNOSTIC_RUN_ID,runAttempt:process.env.DIAGNOSTIC_RUN_ATTEMPT,commit:process.env.DIAGNOSTIC_COMMIT}; fs.writeFileSync("work/diagnostics/failure.json", `${JSON.stringify(body, null, 2)}\n`);'

      - name: Upload one-day debug artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pdf-api-failure-${{ github.run_id }}
          path: work/diagnostics/failure.json
          if-no-files-found: ignore
          retention-days: 1

      - name: Mark failed
        if: failure()
        continue-on-error: true
        env:
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          FAILURE_MESSAGE="GitHub Actions PDF 构建失败，请查看对应运行日志。"

          if [[ -f scripts/supabase-pdf-job.mjs ]] && \
            node scripts/supabase-pdf-job.mjs fail --message "$FAILURE_MESSAGE"; then
            exit 0
          fi

          echo "Repository failure reporter was unavailable; using the minimal API fallback."
          FAILURE_MESSAGE="$FAILURE_MESSAGE" node --input-type=module <<'NODE'
          const supabaseUrl = String(process.env.SUPABASE_URL || '').trim().replace(/\/$/, '')
          const serviceKey = String(
            process.env.SUPABASE_SECRET_KEY || process.env.SUPABASE_SERVICE_ROLE_KEY || '',
          ).trim()
          const jobId = String(process.env.JOB_ID || '').trim()
          const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i
          const legacyJwtPattern = /^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/

          if (!supabaseUrl || !serviceKey || !uuidPattern.test(jobId)) {
            throw new Error('Failure reporter configuration is invalid')
          }

          const isSecretKey = serviceKey.startsWith('sb_secret_')
          if (!isSecretKey && !legacyJwtPattern.test(serviceKey)) {
            throw new Error('Failure reporter service key format is unsupported')
          }

          const url = new URL(`${supabaseUrl}/rest/v1/pdf_jobs`)
          url.searchParams.set('id', `eq.${jobId}`)
          url.searchParams.set('status', 'in.(queued,building,uploading)')

          const now = new Date().toISOString()
          const runId = Number(process.env.GITHUB_RUN_ID || 0) || null
          const repository = String(process.env.GITHUB_REPOSITORY || '')
          const serverUrl = String(process.env.GITHUB_SERVER_URL || 'https://github.com')
          const response = await fetch(url, {
            method: 'PATCH',
            headers: {
              apikey: serviceKey,
              ...(isSecretKey ? {} : { Authorization: `Bearer ${serviceKey}` }),
              'Content-Type': 'application/json',
              Prefer: 'return=representation',
            },
            body: JSON.stringify({
              status: 'failed',
              progress_stage: 'failed',
              error_message: String(process.env.FAILURE_MESSAGE || 'PDF 构建失败。').slice(0, 500),
              completed_at: now,
              updated_at: now,
              github_run_id: runId,
              github_run_url: runId && repository ? `${serverUrl}/${repository}/actions/runs/${runId}` : null,
              github_commit: process.env.GITHUB_SHA || null,
            }),
          })

          if (!response.ok) {
            throw new Error(`Failure status update was rejected (${response.status})`)
          }

          const rows = await response.json().catch(() => null)
          if (!Array.isArray(rows) || rows.length > 1) {
            throw new Error('Failure status update returned an unexpected result')
          }

          console.log(rows.length === 1
            ? 'PDF job marked failed by the API fallback.'
            : 'PDF job was already terminal; failure update skipped.')
          NODE
