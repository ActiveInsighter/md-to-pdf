name: Validate PDF Renderer

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'themes/**'
      - 'style.css'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-pdf.yml'
      - '.github/workflows/validate-renderer.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'themes/**'
      - 'style.css'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-pdf.yml'
      - '.github/workflows/validate-renderer.yml'
  workflow_dispatch:

concurrency:
  group: validate-pdf-renderer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PDF_POSTPROCESS_STRICT: 'true'
      PDF_PREVIEW_DPI: '110'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies, fonts, Chrome, and PDF tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk poppler-utils
          fc-cache -f
          npm ci --prefer-offline --no-audit --no-fund
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome executable was not found on the runner."
            exit 1
          fi
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Run renderer regression test
        run: npm test

      - name: Upload regression outputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: renderer-regression
          path: .tmp/render-test/**
          if-no-files-found: error
