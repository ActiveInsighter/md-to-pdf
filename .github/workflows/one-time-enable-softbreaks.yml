name: One-time enable Markdown soft breaks

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-time-enable-softbreaks.yml

permissions:
  contents: write

jobs:
  patch-renderer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Markdown soft-break rendering
        run: |
          python - <<'PY'
          from pathlib import Path

          renderer = Path('scripts/build-pdf.mjs')
          source = renderer.read_text(encoding='utf-8')
          old = '    breaks: false,'
          new = '    breaks: true,'

          if old not in source:
              raise SystemExit('Expected breaks: false setting was not found')

          renderer.write_text(source.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/one-time-enable-softbreaks.yml').unlink()
          PY

      - name: Commit renderer update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Enable Markdown soft breaks [skip ci]"
          git push origin HEAD:main
