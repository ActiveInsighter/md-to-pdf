name: Format frontend

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/format-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Mark formatting pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'frontend-formatting',
              target_url: runUrl,
              description: 'Formatting frontend sources',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Add format check command
        working-directory: frontend
        run: npm pkg set scripts.format:check='prettier --check .'

      - name: Format frontend
        working-directory: frontend
        run: npm run format

      - name: Validate formatted frontend
        working-directory: frontend
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit formatted frontend
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend
          if git diff --cached --quiet; then
            echo 'Frontend is already formatted.'
          else
            git commit -m 'style: format frontend sources'
            git push
          fi

      - name: Publish formatting result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'frontend-formatting',
              target_url: runUrl,
              description: state === 'success'
                ? 'Frontend formatted and validated'
                : 'Frontend formatting failed',
            })
