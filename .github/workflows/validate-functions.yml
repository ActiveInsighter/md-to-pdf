name: Validate Supabase Functions

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validate-functions.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'frontend/src/features/pdf-jobs/types.ts'
      - 'frontend/src/features/pdf-jobs/status.ts'
      - 'supabase/config.toml'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: functions-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install locked validation tools
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --no-audit --no-fund

      - name: Test shared Edge Function modules
        run: npm run test:functions

      - name: Type-check every Edge Function
        run: npm run check:functions

      - name: Validate shared function wiring
        shell: bash
        run: |
          set -euo pipefail

          test -s supabase/functions/_shared/cors.test.ts
          test -s supabase/functions/_shared/pdf-job-status.ts
          test -s supabase/functions/_shared/pdf-job-status.test.ts
          if grep -RFn "'Access-Control-Allow-Origin': '*'" supabase/functions; then
            echo 'Supabase Functions must not allow every browser origin.'
            exit 1
          fi

          functions=(
            cancel-pdf-job
            confirm-pdf-upload
            create-pdf-job
            favorite-pdf-job
            get-pdf-download
            rebuild-pdf-job
            start-pdf-job
          )

          declared_functions="$(printf '%s\n' "${functions[@]}" | sort)"
          discovered_functions="$(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort)"
          if [[ "$declared_functions" != "$discovered_functions" ]]; then
            echo 'validate-functions.yml must cover every Edge Function directory.'
            diff <(printf '%s\n' "$declared_functions") <(printf '%s\n' "$discovered_functions") || true
            exit 1
          fi

          for function_name in "${functions[@]}"; do
            file="supabase/functions/${function_name}/index.ts"
            test -s "$file"
            grep -q "handleOptions(req)" "$file"
            grep -q "json(req," "$file"
            grep -Fq "[functions.${function_name}]" supabase/config.toml
          done

          grep -q 'isStartIdempotentPdfJobStatus' supabase/functions/start-pdf-job/index.ts
          grep -q 'PDF_JOB_PENDING_INPUT_STATUSES' supabase/functions/start-pdf-job/index.ts
          grep -q 'PDF_JOB_PENDING_INPUT_STATUSES' supabase/functions/cancel-pdf-job/index.ts
          grep -q 'isPendingInputPdfJobStatus' supabase/functions/cancel-pdf-job/logic.ts
