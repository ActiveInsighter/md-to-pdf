name: Format accessibility updates

on:
  push:
    branches:
      - 'agent/repository-hygiene-smoke-command'
    paths:
      - '.github/workflows/format-a11y-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Mark accessibility formatting pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'accessibility-formatting',
              target_url: runUrl,
              description: 'Formatting accessibility updates',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Format accessibility files
        working-directory: frontend
        run: |
          npx prettier --write \
            src/components/AuthPanel.tsx \
            src/components/PdfJobHistory.tsx \
            src/components/PdfJobStatus.tsx \
            src/components/PdfUpload.tsx \
            src/pages/PdfBuilderPage.tsx \
            src/types/pdfJob.ts

      - name: Validate accessibility updates
        working-directory: frontend
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run build

      - name: Commit formatted accessibility files
        run: |
          if git diff --quiet -- frontend; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend
          git commit -m 'style(frontend): format accessibility updates'
          git push

      - name: Publish accessibility formatting result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'accessibility-formatting',
              target_url: runUrl,
              description: state === 'success'
                ? 'Accessibility formatting and validation passed'
                : 'Accessibility formatting or validation failed',
            })
