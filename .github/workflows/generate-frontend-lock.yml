name: Generate frontend lockfile

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/generate-frontend-lock.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  generate-lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Mark generation pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'frontend-lockfile-generator',
              target_url: runUrl,
              description: 'Generating and validating frontend lockfile',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate package lock
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate clean install
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v7
        with:
          name: frontend-package-lock-${{ github.run_id }}
          path: frontend/package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Publish generation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'frontend-lockfile-generator',
              target_url: runUrl,
              description: state === 'success'
                ? 'Frontend lockfile generated and npm ci passed'
                : 'Frontend lockfile generation failed',
            })
