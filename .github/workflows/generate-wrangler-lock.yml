name: Generate Wrangler lockfile

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/generate-wrangler-lock.yml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Generate locked Wrangler dependency
        working-directory: frontend
        run: |
          set -euo pipefail
          npm install --save-dev --save-exact wrangler@4.110.0 \
            --package-lock-only --ignore-scripts --no-audit --no-fund
          node -e "const pkg = require('./package.json'); const lock = require('./package-lock.json'); if (pkg.devDependencies.wrangler !== '4.110.0' || lock.packages[''].devDependencies.wrangler !== '4.110.0') process.exit(1)"

      - name: Upload generated manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wrangler-lock-${{ github.run_id }}
          path: |
            frontend/package.json
            frontend/package-lock.json
          if-no-files-found: error
          retention-days: 1
