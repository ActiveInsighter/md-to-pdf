name: Generate Wrangler lockfile

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/generate-wrangler-lock.yml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'

permissions:
  contents: write

jobs:
  generate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Generate locked Wrangler dependency
        working-directory: frontend
        run: |
          set -euo pipefail
          npm install --save-dev --save-exact wrangler@4.110.0 \
            --package-lock-only --ignore-scripts --no-audit --no-fund
          node -e "const pkg = require('./package.json'); const lock = require('./package-lock.json'); if (pkg.devDependencies.wrangler !== '4.110.0' || lock.packages[''].devDependencies.wrangler !== '4.110.0' || lock.packages['node_modules/wrangler'].version !== '4.110.0') process.exit(1)"

      - name: Commit generated manifests
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/package.json frontend/package-lock.json; then
            echo 'Wrangler manifests are already current.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/package.json frontend/package-lock.json
          git commit -m 'chore: lock Wrangler 4.110.0'
          git push origin "HEAD:$BRANCH"
