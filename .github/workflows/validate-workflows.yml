name: Validate workflow security policy

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'scripts/validate-workflows.mjs'
      - 'scripts/test-validate-workflows.mjs'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'scripts/validate-workflows.mjs'
      - 'scripts/test-validate-workflows.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install policy validator dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run workflow policy regression tests
        run: npm run test:workflow-policy

      - name: Validate workflow security policy
        run: npm run validate:workflows
