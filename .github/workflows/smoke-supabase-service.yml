name: Smoke test Supabase PDF service

on:
  push:
    branches:
      - main
      - 'agent/**'
    paths:
      - '.github/workflows/smoke-supabase-service.yml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/scripts/smoke-supabase-service.mjs'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: supabase-pdf-service-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Mark smoke test pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description: 'Supabase PDF service smoke test is running',
            })

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_STORAGE_BUCKET VITE_SUPABASE_ANON_KEY; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done
          [[ -n "${SUPABASE_SECRET_KEY:-}" || -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || {
            echo "Missing SUPABASE_SECRET_KEY or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Run end-to-end smoke test
        working-directory: frontend
        run: npm run smoke:supabase

      - name: Upload smoke diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: supabase-service-smoke-${{ github.run_id }}
          path: frontend/smoke-diagnostic.json
          if-no-files-found: warn
          retention-days: 1

      - name: Publish smoke test result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}'
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const description = state === 'success'
              ? 'Supabase PDF service smoke test passed'
              : state === 'error'
                ? 'Supabase PDF service smoke test was cancelled'
                : 'Supabase PDF service smoke test failed'

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description,
            })
