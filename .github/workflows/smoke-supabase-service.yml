name: Smoke test Supabase PDF service

on:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: supabase-pdf-service-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Mark smoke test pending
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description: 'Supabase PDF service smoke test is running',
            })

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_STORAGE_BUCKET VITE_SUPABASE_ANON_KEY; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done
          [[ -n "${SUPABASE_SECRET_KEY:-}" || -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || {
            echo "Missing SUPABASE_SECRET_KEY or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Verify pinned Wrangler
        working-directory: frontend
        run: ./node_modules/.bin/wrangler --version

      - name: Verify browser CORS preflights
        working-directory: frontend
        run: npm run smoke:cors

      - name: Run end-to-end smoke test
        working-directory: frontend
        run: npm run smoke:supabase

      - name: Upload smoke diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supabase-service-smoke-${{ github.run_id }}
          path: frontend/smoke-diagnostic.json
          if-no-files-found: warn
          retention-days: 1

      - name: Publish smoke test result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const jobStatus = process.env.JOB_STATUS
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const description = state === 'success'
              ? 'Supabase PDF service smoke test passed'
              : state === 'error'
                ? 'Supabase PDF service smoke test was cancelled'
                : 'Supabase PDF service smoke test failed'

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description,
            })
