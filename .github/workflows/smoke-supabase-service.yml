name: Smoke test Supabase PDF service

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-pdf-api.yml'
      - '.github/workflows/smoke-supabase-service.yml'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/scripts/smoke-function-cors.mjs'
      - 'frontend/scripts/smoke-supabase-service.mjs'
      - 'scripts/cleanup-supabase-pdf-jobs.mjs'
      - 'scripts/prepare-supabase-input.py'
      - 'scripts/supabase-pdf-job.mjs'
      - 'supabase/config.toml'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: supabase-pdf-service-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Mark smoke test pending
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description: 'Supabase PDF service smoke test is running',
            })

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_URL SUPABASE_STORAGE_BUCKET VITE_SUPABASE_ANON_KEY; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done
          [[ -n "${SUPABASE_SECRET_KEY:-}" || -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]] || {
            echo "Missing SUPABASE_SECRET_KEY or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Verify browser CORS preflights
        working-directory: frontend
        run: npm run smoke:cors

      - name: Run end-to-end smoke test
        working-directory: frontend
        run: npm run smoke:supabase

      - name: Upload smoke diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: supabase-service-smoke-${{ github.run_id }}
          path: frontend/smoke-diagnostic.json
          if-no-files-found: warn
          retention-days: 1

      - name: Publish smoke test result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const jobStatus = process.env.JOB_STATUS
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const description = state === 'success'
              ? 'Supabase PDF service smoke test passed'
              : state === 'error'
                ? 'Supabase PDF service smoke test was cancelled'
                : 'Supabase PDF service smoke test failed'

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'supabase-service-smoke',
              target_url: runUrl,
              description,
            })
