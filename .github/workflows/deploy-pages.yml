name: Deploy frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: md-to-pdf-web
  PLAYWRIGHT_VERSION: 1.55.0

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Mark Pages deployment pending
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'cloudflare-pages',
              target_url: runUrl,
              description: 'Cloudflare Pages deployment is running',
            })

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done

      - name: Install and build frontend
        working-directory: frontend
        shell: bash
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          npm ci --prefer-offline --no-audit --no-fund
          ./node_modules/.bin/wrangler --version
          npm run typecheck
          npm run build
          test -s dist/index.html

      - name: Ensure Pages project exists
        working-directory: frontend
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          WRANGLER=./node_modules/.bin/wrangler
          PROJECTS_JSON="$("$WRANGLER" pages project list --json)"
          if printf '%s' "$PROJECTS_JSON" | jq -e --arg project "$CLOUDFLARE_PAGES_PROJECT" \
            'any(.[]; .["Project Name"] == $project)' >/dev/null; then
            echo "Cloudflare Pages project already exists: $CLOUDFLARE_PAGES_PROJECT"
          else
            "$WRANGLER" pages project create "$CLOUDFLARE_PAGES_PROJECT" \
              --production-branch main
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ./node_modules/.bin/wrangler pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Wait for production UI
        shell: bash
        env:
          PAGES_URL: https://${{ env.CLOUDFLARE_PAGES_PROJECT }}.pages.dev
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error --location \
              --max-time 20 \
              --header 'Cache-Control: no-cache' \
              "$PAGES_URL/?deployment=$GITHUB_SHA" \
              --output /tmp/pages-index.html; then
              test -s /tmp/pages-index.html
              echo "Production UI is reachable on attempt $attempt."
              exit 0
            fi
            sleep 5
          done
          echo "Production UI did not become reachable after deployment."
          exit 1

      - name: Verify screenshot tooling
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          google-chrome --version
          npx --yes "playwright@${PLAYWRIGHT_VERSION}" --version

      - name: Capture deployed UI screenshots
        working-directory: frontend
        shell: bash
        env:
          PAGES_URL: https://${{ env.CLOUDFLARE_PAGES_PROJECT }}.pages.dev
        run: |
          set -euo pipefail
          SCREENSHOT_DIR="deployment-screenshots"
          TARGET_URL="$PAGES_URL/?deployment=$GITHUB_SHA"
          rm -rf "$SCREENSHOT_DIR"
          mkdir -p "$SCREENSHOT_DIR"

          npx --yes "playwright@${PLAYWRIGHT_VERSION}" screenshot \
            --channel chrome \
            --color-scheme light \
            --lang zh-CN \
            --viewport-size "1440,1000" \
            --full-page \
            --wait-for-selector "#root" \
            --wait-for-timeout 2500 \
            --timeout 30000 \
            "$TARGET_URL" \
            "$SCREENSHOT_DIR/desktop-1440.png"

          npx --yes "playwright@${PLAYWRIGHT_VERSION}" screenshot \
            --channel chrome \
            --color-scheme light \
            --lang zh-CN \
            --device "iPhone 13" \
            --full-page \
            --wait-for-selector "#root" \
            --wait-for-timeout 2500 \
            --timeout 30000 \
            "$TARGET_URL" \
            "$SCREENSHOT_DIR/mobile-iphone-13.png"

          node --input-type=module <<'NODE'
          import { writeFile } from 'node:fs/promises'

          const metadata = {
            url: process.env.PAGES_URL,
            commit: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID,
            capturedAt: new Date().toISOString(),
            playwrightVersion: process.env.PLAYWRIGHT_VERSION,
            browserChannel: 'chrome',
            screenshots: [
              { file: 'desktop-1440.png', viewport: '1440x1000', fullPage: true },
              { file: 'mobile-iphone-13.png', device: 'iPhone 13', fullPage: true },
            ],
          }
          await writeFile('deployment-screenshots/metadata.json', `${JSON.stringify(metadata, null, 2)}\n`)
          NODE

          test -s "$SCREENSHOT_DIR/desktop-1440.png"
          test -s "$SCREENSHOT_DIR/mobile-iphone-13.png"

      - name: Upload deployed UI screenshots
        id: upload-ui-screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cloudflare-pages-ui-${{ github.run_id }}
          path: frontend/deployment-screenshots
          if-no-files-found: warn
          retention-days: 7

      - name: Add screenshot summary
        if: always()
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload-ui-screenshots.outputs.artifact-url }}
          PAGES_URL: https://${{ env.CLOUDFLARE_PAGES_PROJECT }}.pages.dev
        run: |
          {
            echo '## Cloudflare Pages UI capture'
            echo
            echo "- Production: $PAGES_URL"
            echo "- Commit: \`$GITHUB_SHA\`"
            if [[ -n "${ARTIFACT_URL:-}" ]]; then
              echo "- Screenshots: $ARTIFACT_URL"
            else
              echo "- Screenshots: not available"
            fi
            echo '- Files: desktop-1440.png, mobile-iphone-13.png, metadata.json'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Pages deployment result
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const jobStatus = process.env.JOB_STATUS
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const description = state === 'success'
              ? 'Cloudflare Pages deployment and UI capture completed'
              : state === 'error'
                ? 'Cloudflare Pages deployment was cancelled'
                : 'Cloudflare Pages deployment or UI capture failed'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const pagesUrl = `https://${process.env.CLOUDFLARE_PAGES_PROJECT}.pages.dev`

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'cloudflare-pages',
              target_url: state === 'success' ? pagesUrl : runUrl,
              description,
            })
