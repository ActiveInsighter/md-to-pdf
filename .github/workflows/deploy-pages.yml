name: Deploy frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  statuses: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

env:
  CLOUDFLARE_PAGES_PROJECT: md-to-pdf-web

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Mark Pages deployment pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'cloudflare-pages',
              target_url: runUrl,
              description: 'Cloudflare Pages deployment is running',
            })

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment secrets
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            [[ -n "${!name:-}" ]] || {
              echo "Missing required repository secret: $name"
              exit 1
            }
          done

      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          npm ci --prefer-offline --no-audit --no-fund
          npm run typecheck
          npm run build
          test -s dist/index.html

      - name: Ensure Pages project exists
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PROJECTS_JSON="$(npx --yes wrangler@4 pages project list --json)"
          if printf '%s' "$PROJECTS_JSON" | jq -e --arg project "$CLOUDFLARE_PAGES_PROJECT" \
            'any(.[]; .["Project Name"] == $project)' >/dev/null; then
            echo "Cloudflare Pages project already exists: $CLOUDFLARE_PAGES_PROJECT"
          else
            npx --yes wrangler@4 pages project create "$CLOUDFLARE_PAGES_PROJECT" \
              --production-branch main
          fi

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx --yes wrangler@4 pages deploy frontend/dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main \
            --commit-hash "$GITHUB_SHA"

      - name: Publish Pages deployment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}'
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const description = state === 'success'
              ? 'Cloudflare Pages deployment completed'
              : state === 'error'
                ? 'Cloudflare Pages deployment was cancelled'
                : 'Cloudflare Pages deployment failed'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const pagesUrl = `https://${process.env.CLOUDFLARE_PAGES_PROJECT}.pages.dev`

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'cloudflare-pages',
              target_url: state === 'success' ? pagesUrl : runUrl,
              description,
            })
