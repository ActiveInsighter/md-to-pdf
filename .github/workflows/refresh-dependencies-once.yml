name: Refresh dependencies once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: refresh-dependencies-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'chore/upgrade-dependencies-')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - name: Checkout dependency branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Upgrade root dependencies
        shell: bash
        run: |
          set -euo pipefail
          npx --yes npm-check-updates@latest -u --target latest
          npm install --no-audit --no-fund

      - name: Upgrade frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          npx --yes npm-check-updates@latest -u --target latest
          npm install --no-audit --no-fund

      - name: Commit refreshed manifests and lockfiles
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json frontend/package.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo 'Dependencies are already current.'
            exit 0
          fi
          git commit -m 'chore(deps): update npm dependencies to latest stable'
          git push origin HEAD:${{ github.head_ref }}
