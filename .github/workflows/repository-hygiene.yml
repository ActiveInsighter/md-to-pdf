name: Validate repository hygiene

on:
  push:
    branches:
      - 'agent/**'
      - 'refactor/**'
    paths:
      - '.gitignore'
      - 'ui-ux-pro-max/**'
      - '.github/workflows/repository-hygiene.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.gitignore'
      - 'ui-ux-pro-max/**'
      - '.github/workflows/repository-hygiene.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Collect tracked generated files
        shell: bash
        run: |
          set -euo pipefail

          git ls-files \
            | grep -E '(^|/)(__pycache__/|[^/]+\.py[co]$|\.tmp/|work/|coverage/|playwright-report/|test-results/)' \
            > tracked-generated-files.txt \
            || true

          if [[ -s tracked-generated-files.txt ]]; then
            echo 'Generated files must not be tracked:'
            cat tracked-generated-files.txt
          fi

      - name: Upload hygiene diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repository-hygiene-diagnostics
          path: tracked-generated-files.txt
          if-no-files-found: error
          retention-days: 1

      - name: Reject tracked generated files
        shell: bash
        run: |
          set -euo pipefail
          test ! -s tracked-generated-files.txt

      - name: Validate ignore rules
        shell: bash
        run: |
          set -euo pipefail

          ignored_paths=(
            '.tmp/example.txt'
            'work/example.txt'
            'coverage/example.txt'
            'playwright-report/example.txt'
            'test-results/example.txt'
            'ui-ux-pro-max/scripts/__pycache__/example.pyc'
          )

          for path in "${ignored_paths[@]}"; do
            if ! git check-ignore --quiet "$path"; then
              echo "Expected path to be ignored: $path"
              exit 1
            fi
          done
