name: Repository hygiene

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pages.yml'
      - '.github/workflows/repository-hygiene.yml'
      - '.github/workflows/smoke-supabase-service.yml'
      - '.gitignore'
      - '.env.example'
      - 'README.md'
      - 'docs/supabase-pdf-service.md'
      - 'frontend/package.json'
      - 'frontend/scripts/**'
      - 'scripts/**'
      - 'supabase/functions/.env.example'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Reject new generated files
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          generated="$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" | grep -E '^(\.tmp/|work/|coverage/|playwright-report/|test-results/|frontend/smoke-diagnostic\.json$)' || true)"
          if [[ -n "$generated" ]]; then
            echo 'This pull request adds generated files:'
            printf '%s\n' "$generated"
            exit 1
          fi

      - name: Validate environment configuration docs
        shell: bash
        run: |
          set -euo pipefail
          files=(
            .env.example
            supabase/functions/.env.example
            README.md
            docs/supabase-pdf-service.md
          )

          if grep -nE '^[[:space:]]*GITHUB_(OWNER|REPO|WORKFLOW_FILE|WORKFLOW_REF)([[:space:]]*=|[[:space:]]*$)' "${files[@]}"; then
            echo 'Configuration docs contain repository settings that are fixed in start-pdf-job.'
            exit 1
          fi

          if grep -nF 'npm install --no-audit --no-fund' README.md docs/supabase-pdf-service.md; then
            echo 'Documentation must use the committed lockfile through npm ci.'
            exit 1
          fi

          grep -q '^GITHUB_TOKEN=' .env.example
          grep -q '^PDF_STORAGE_BUCKET=' .env.example
          grep -q '^GITHUB_TOKEN=' supabase/functions/.env.example
          grep -q '^PDF_STORAGE_BUCKET=' supabase/functions/.env.example
          grep -q 'Direct Upload' README.md
          grep -q 'Pages Direct Upload' docs/supabase-pdf-service.md

      - name: Validate frontend workflow dependency strategy
        shell: bash
        run: |
          set -euo pipefail
          workflows=(
            .github/workflows/deploy-pages.yml
            .github/workflows/smoke-supabase-service.yml
          )

          for workflow in "${workflows[@]}"; do
            grep -q 'cache: npm' "$workflow"
            grep -q 'cache-dependency-path: frontend/package.json' "$workflow"
            grep -q 'npm install --prefer-offline --no-audit --no-fund' "$workflow"
          done

          if grep -nF 'npm install --no-audit --no-fund' "${workflows[@]}"; then
            echo 'Frontend workflows must use the cached prefer-offline install strategy.'
            exit 1
          fi

          npm install --prefix frontend --prefer-offline --no-audit --no-fund
          npm run --prefix frontend typecheck

      - name: Validate callable smoke test
        shell: bash
        run: |
          set -euo pipefail
          test -f frontend/scripts/smoke-supabase-service.mjs
          node -e "const pkg = require('./frontend/package.json'); if (pkg.scripts?.['smoke:supabase'] !== 'node scripts/smoke-supabase-service.mjs') process.exit(1)"
          node --check frontend/scripts/smoke-supabase-service.mjs

      - name: Validate service scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/prepare-supabase-input.py
          node --check scripts/supabase-pdf-job.mjs
          node --check scripts/cleanup-supabase-pdf-jobs.mjs
