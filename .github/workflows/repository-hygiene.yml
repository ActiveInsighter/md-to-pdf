name: Repository hygiene

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.gitignore'
      - '.env.example'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - 'themes/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/src/**'
      - 'frontend/scripts/**'
      - 'frontend/tests/**'
      - 'scripts/**'
      - 'supabase/config.toml'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.gitignore'
      - '.env.example'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - 'themes/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/src/**'
      - 'frontend/scripts/**'
      - 'frontend/tests/**'
      - 'scripts/**'
      - 'supabase/config.toml'
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate repository integrity
        run: |
          npm run validate:repository
          npm run test:repository

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Reject new generated files
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          generated="$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" | grep -E '^(\.tmp/|work/|coverage/|playwright-report/|test-results/|frontend/smoke-diagnostic\.json$)' || true)"
          if [[ -n "$generated" ]]; then
            echo 'This pull request adds generated files:'
            printf '%s\n' "$generated"
            exit 1
          fi

      - name: Validate environment configuration docs
        shell: bash
        run: |
          set -euo pipefail
          files=(
            .env.example
            supabase/functions/.env.example
            README.md
            docs/supabase-pdf-service.md
          )

          if grep -nE '^[[:space:]]*GITHUB_(OWNER|REPO|WORKFLOW_FILE|WORKFLOW_REF)([[:space:]]*=|[[:space:]]*$)' "${files[@]}"; then
            echo 'Configuration docs contain repository settings that are fixed in start-pdf-job.'
            exit 1
          fi

          if grep -nE 'npm install( |$)' README.md docs/supabase-pdf-service.md; then
            echo 'Frontend documentation must use npm ci with the committed lockfile.'
            exit 1
          fi

          grep -q '^GITHUB_TOKEN=' .env.example
          grep -q '^PDF_STORAGE_BUCKET=' .env.example
          grep -q '^GITHUB_TOKEN=' supabase/functions/.env.example
          grep -q '^PDF_STORAGE_BUCKET=' supabase/functions/.env.example
          grep -q 'Direct Upload' README.md
          grep -q 'Pages Direct Upload' docs/supabase-pdf-service.md
          grep -q 'npm ci --prefer-offline --no-audit --no-fund' README.md
          grep -q 'npm ci --prefer-offline --no-audit --no-fund' docs/supabase-pdf-service.md
          grep -q 'supabase functions deploy cancel-pdf-job' README.md
          grep -q 'supabase functions deploy cancel-pdf-job' docs/supabase-pdf-service.md

      - name: Validate workflow security
        run: npm run validate:workflows

      - name: Validate frontend manifests and workflows
        shell: bash
        run: |
          set -euo pipefail
          test -s frontend/package-lock.json
          test -s frontend/tests/frontend-utils.test.mjs
          test -s frontend/tests/cancel-pdf-job-logic.test.mjs
          test -s frontend/tests/pdf-job-updates.test.mjs
          test -s frontend/src/utils/pdfJobUpdates.ts
          test -s supabase/functions/cancel-pdf-job/index.ts
          test -s supabase/functions/cancel-pdf-job/logic.ts
          grep -q '^\[functions.cancel-pdf-job\]$' supabase/config.toml
          grep -q 'updated_at: string' frontend/src/types/pdfJob.ts
          grep -q 'shouldApplyPdfJobUpdate' frontend/src/hooks/usePdfBuilder.ts
          grep -q 'mergePdfJobHistory' frontend/src/utils/pdfJobUpdates.ts
          grep -q 'mergePdfJobHistory' frontend/src/hooks/usePdfBuilder.ts
          grep -q 'onRefresh' frontend/src/components/PdfJobHistory.tsx
          node - <<'NODE'
          const pkg = require('./frontend/package.json')
          const lock = require('./frontend/package-lock.json')
          const expected = '4.110.0'

          if (lock.lockfileVersion !== 3) throw new Error('frontend lockfile must use version 3')
          if (pkg.devDependencies?.wrangler !== expected) throw new Error('package.json must pin Wrangler exactly')
          if (lock.packages?.['']?.devDependencies?.wrangler !== expected) throw new Error('lockfile root must pin Wrangler exactly')
          if (lock.packages?.['node_modules/wrangler']?.version !== expected) throw new Error('lockfile Wrangler package version mismatch')
          if (pkg.scripts?.test !== 'node --test tests/*.test.mjs') throw new Error('frontend test command must remain deterministic')
          NODE

          workflows=(
            .github/workflows/deploy-pages.yml
            .github/workflows/smoke-supabase-service.yml
          )

          for workflow in "${workflows[@]}"; do
            grep -q 'cache: npm' "$workflow"
            grep -q 'cache-dependency-path: frontend/package-lock.json' "$workflow"
            grep -q 'npm ci --prefer-offline --no-audit --no-fund' "$workflow"
          done

          if grep -nE 'npm install( |$)' "${workflows[@]}"; then
            echo 'Frontend workflows must install from the committed lockfile.'
            exit 1
          fi

          if grep -nE 'npx[[:space:]]+--yes[[:space:]]+wrangler@' .github/workflows/deploy-pages.yml; then
            echo 'Deployment must use the Wrangler binary installed from the lockfile.'
            exit 1
          fi

          grep -q 'WRANGLER=./node_modules/.bin/wrangler' .github/workflows/deploy-pages.yml
          grep -q './node_modules/.bin/wrangler pages deploy dist' .github/workflows/deploy-pages.yml

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --prefer-offline --no-audit --no-fund

      - name: Validate locked Wrangler CLI
        run: frontend/node_modules/.bin/wrangler --version | grep -q '4.110.0'

      - name: Typecheck frontend
        run: npm run --prefix frontend typecheck

      - name: Test frontend
        run: npm test --prefix frontend

      - name: Build frontend
        run: npm run --prefix frontend build

      - name: Validate callable smoke test
        shell: bash
        run: |
          set -euo pipefail
          smoke=frontend/scripts/smoke-supabase-service.mjs
          workflow=.github/workflows/smoke-supabase-service.yml
          test -f "$smoke"
          node -e "const pkg = require('./frontend/package.json'); if (pkg.scripts?.['smoke:supabase'] !== 'node scripts/smoke-supabase-service.mjs') process.exit(1)"
          node --check "$smoke"
          grep -Fq "functions.invoke('cancel-pdf-job'" "$smoke"
          grep -Fq 'cleanupPending === false' "$smoke"
          grep -Fq 'repeated cancellation was not idempotent' "$smoke"
          grep -Fq 'start-pdf-job accepted a cancelled task' "$smoke"
          grep -Fq "'supabase/functions/**'" "$workflow"
          grep -Fq "'supabase/migrations/**'" "$workflow"
          grep -Fq "'scripts/supabase-pdf-job.mjs'" "$workflow"

      - name: Validate service scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/prepare-supabase-input.py
          node --check scripts/supabase-pdf-job.mjs
          node --check scripts/cleanup-supabase-pdf-jobs.mjs
