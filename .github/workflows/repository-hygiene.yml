name: Repository hygiene

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate repository structure and hygiene
        run: npm run validate:repository

      - name: Test repository validators
        run: npm run test:repository

      - name: Test workflow validators
        run: npm run test:workflows

      - name: Validate workflow policy
        run: npm run validate:workflows

      - name: Validate contributor documentation
        shell: bash
        run: |
          set -euo pipefail
          test -s AGENTS.md
          test -s docs/contributor-guide.md
          grep -q 'Temporary branch hygiene' AGENTS.md
          grep -q 'npm ci' AGENTS.md
          grep -Fq '<!-- ci:repository-validation -->' docs/contributor-guide.md
          grep -Fq '<!-- ci:never-commit-generated-outputs -->' docs/contributor-guide.md
          grep -q 'npm ci' docs/contributor-guide.md

      - name: Validate deployed desktop UI capture contract
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/capture-deployed-desktop.mjs
          grep -Fq 'data-ui-capture="authenticated-workspace"' frontend/src/routes/WorkspacePage.tsx
          grep -Fq 'data-ui-capture={marker}' frontend/src/routes/JobsPage.tsx
          grep -Fq 'data-ui-capture="job-detail"' frontend/src/routes/JobDetailPage.tsx
          grep -Fq 'data-ui-capture="settings-page"' frontend/src/routes/SettingsPage.tsx
          grep -Fq "workspace-create-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "workspace-batch-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "jobs-list-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "job-detail-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "favorites-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "settings-desktop.png" scripts/capture-deployed-desktop.mjs
          grep -Fq "const OVERVIEW_FILE = 'ui-overview.png'" scripts/capture-deployed-desktop.mjs
          grep -Fq "manualGenerateFlow: true" scripts/capture-deployed-desktop.mjs
          ! grep -Fq 'mobile-390' .github/workflows/deploy-pages.yml
          grep -Fq 'desktop 1440x1000 only' .github/workflows/deploy-pages.yml

      - name: Validate detail-only progress flow contract
        shell: bash
        run: |
          set -euo pipefail
          test ! -e frontend/src/features/pdf-jobs/components/JobTimeline.tsx
          grep -Fq 'getJobFlowSteps' frontend/src/features/pdf-jobs/components/JobProgress.tsx
          grep -Fq 'formatElapsedClock' frontend/src/features/pdf-jobs/components/JobProgress.tsx
          grep -Fq '<JobProgress job={item}' frontend/src/routes/JobDetailPage.tsx
          ! grep -Fq 'JobProgress' frontend/src/routes/WorkspacePage.tsx
          ! grep -Fq 'JobProgress' frontend/src/features/pdf-jobs/components/JobList.tsx

      - name: Validate manual generate and source retention
        shell: bash
        run: |
          set -euo pipefail
          ! grep -Fq 'submission.prepare' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          ! grep -Fq 'async function prepare' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'const submit = form.handleSubmit' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq 'type="submit"' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq '点击生成后上传' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq 'await actions.create.mutateAsync' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'await actions.uploadMarkdown.mutateAsync' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'await actions.confirmUpload.mutateAsync' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'await actions.start.mutateAsync' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'yieldToBrowser' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq 'sourceIntent' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq 'data-ui-capture="source-upload-status"' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq "kind === 'source'" supabase/functions/get-pdf-download/index.ts
          grep -Fq 'ALLOWED_THEMES' supabase/functions/rebuild-pdf-job/index.ts
          grep -Fq '用源稿重新构建' frontend/src/features/pdf-jobs/components/JobActions.tsx

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run build

      - name: Validate Supabase smoke scripts
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/smoke-function-cors.mjs
          node --check scripts/smoke-supabase-service.mjs
          node --check scripts/manage-ui-capture-user.mjs
          grep -q "method: 'OPTIONS'" scripts/smoke-function-cors.mjs
          grep -q "create-pdf-job" scripts/smoke-supabase-service.mjs
          grep -q "get-pdf-download" scripts/smoke-supabase-service.mjs
