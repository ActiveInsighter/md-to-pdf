name: Repository hygiene

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate repository structure and hygiene
        run: npm run validate:repository

      - name: Test repository validators
        run: npm run test:repository

      - name: Test workflow validators
        run: npm run test:workflows

      - name: Validate workflow policy
        run: npm run validate:workflows

      - name: Validate contributor documentation
        shell: bash
        run: |
          set -euo pipefail
          test -s AGENTS.md
          test -s docs/contributor-guide.md
          grep -q 'Temporary branch hygiene' AGENTS.md
          grep -q 'npm ci' AGENTS.md
          grep -Fq '<!-- ci:repository-validation -->' docs/contributor-guide.md
          grep -Fq '<!-- ci:never-commit-generated-outputs -->' docs/contributor-guide.md
          grep -q 'npm ci' docs/contributor-guide.md

      - name: Validate deployed UI capture contract
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/capture-deployed-ui.mjs
          grep -Fq 'data-ui-capture="authenticated-workspace"' frontend/src/routes/WorkspacePage.tsx
          grep -Fq 'AUTHENTICATED_WORKSPACE_SELECTOR' scripts/capture-deployed-ui.mjs
          grep -Fq '[data-ui-capture="authenticated-workspace"]' scripts/capture-deployed-ui.mjs
          grep -Fq "const OVERVIEW_FILE = 'ui-overview.png'" scripts/capture-deployed-ui.mjs
          grep -Fq 'ui-overview.png' .github/workflows/deploy-pages.yml

      - name: Validate job progress flow contract
        shell: bash
        run: |
          set -euo pipefail
          test ! -e frontend/src/features/pdf-jobs/components/JobTimeline.tsx
          grep -Fq 'getJobFlowSteps' frontend/src/features/pdf-jobs/components/JobProgress.tsx
          grep -Fq 'formatElapsedClock' frontend/src/features/pdf-jobs/components/JobProgress.tsx
          ! grep -Fq 'JobTimeline' frontend/src/routes/JobDetailPage.tsx
          grep -Fq 'showProgress={false}' frontend/src/routes/WorkspacePage.tsx

      - name: Validate staged upload and source retention contract
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'async function prepare' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq 'async function submit' frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -Fq '粘贴剪切板' frontend/src/features/pdf-builder/components/SingleJobForm.tsx
          grep -Fq '文件已上传，等待生成 PDF' frontend/src/features/pdf-builder/submissionReducer.ts
          grep -Fq "kind === 'source'" supabase/functions/get-pdf-download/index.ts
          grep -Fq 'ALLOWED_THEMES' supabase/functions/rebuild-pdf-job/index.ts
          grep -Fq '用源稿重新构建' frontend/src/features/pdf-jobs/components/JobActions.tsx
          ! grep -Fq '完成后的操作' frontend/src/features/pdf-builder/components/SingleJobForm.tsx

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run build

      - name: Validate Supabase smoke scripts
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/smoke-function-cors.mjs
          node --check scripts/smoke-supabase-service.mjs
          grep -q "method: 'OPTIONS'" scripts/smoke-function-cors.mjs
          grep -q "create-pdf-job" scripts/smoke-supabase-service.mjs
          grep -q "get-pdf-download" scripts/smoke-supabase-service.mjs
