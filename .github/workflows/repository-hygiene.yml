name: Repository hygiene

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate repository integrity
        run: npm run validate:repository

      - name: Test repository validators
        run: npm run test:repository

      - name: Test workflow validators
        run: npm run test:workflows

      - name: Validate workflow policy
        run: npm run validate:workflows

      - name: Validate generated output policy
        run: npm run validate:generated-files

      - name: Validate contributor documentation
        shell: bash
        run: |
          set -euo pipefail
          test -s AGENTS.md
          test -s docs/contributor-guide.md
          grep -q 'Temporary branch hygiene' AGENTS.md
          grep -q 'npm ci' AGENTS.md
          grep -q 'Repository validation' docs/contributor-guide.md
          grep -q 'Never commit generated outputs' docs/contributor-guide.md
          grep -q 'npm ci' docs/contributor-guide.md

      - name: Validate frontend architecture manifests
        run: node scripts/validate-frontend-architecture.mjs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run build

      - name: Validate Supabase Function CORS smoke contract
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run smoke:cors

      - name: Validate authenticated Supabase smoke contract
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run smoke:supabase
