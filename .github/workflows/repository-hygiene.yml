name: Repository hygiene

on:
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'docs/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'supabase/functions/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node with frontend npm cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate repository integrity
        run: npm run validate:repository

      - name: Test repository validator
        run: npm run test:repository

      - name: Test workflow security validators
        run: npm run test:workflows

      - name: Validate workflow security policy
        run: npm run validate:workflows

      - name: Validate generated output policy
        run: npm run validate:generated-files

      - name: Validate contributor documentation
        run: |
          set -euo pipefail
          test -s AGENTS.md
          test -s docs/contributor-guide.md
          grep -q 'Temporary branch hygiene' AGENTS.md
          grep -q 'npm ci' AGENTS.md
          grep -q 'Repository validation' docs/contributor-guide.md
          grep -q 'Never commit generated outputs' docs/contributor-guide.md
          grep -q 'npm ci' docs/contributor-guide.md

      - name: Validate frontend architecture manifests
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            frontend/package.json
            frontend/package-lock.json
            frontend/tsconfig.json
            frontend/tsconfig.app.json
            frontend/vite.config.ts
            frontend/tailwind.config.ts
            frontend/src/app/App.tsx
            frontend/src/app/router.tsx
            frontend/src/app/providers.tsx
            frontend/src/lib/queryClient.ts
            frontend/src/lib/supabase.ts
            frontend/src/stores/workspaceStore.ts
            frontend/src/features/pdf-jobs/types.ts
            frontend/src/features/pdf-jobs/queryKeys.ts
            frontend/src/features/pdf-jobs/status.ts
            frontend/src/features/pdf-jobs/hooks/cache.ts
            frontend/src/features/pdf-jobs/hooks/PdfJobsRealtimeBridge.tsx
            frontend/src/features/pdf-jobs/hooks/usePdfJob.ts
            frontend/src/features/pdf-jobs/hooks/usePdfJobs.ts
            frontend/src/features/pdf-jobs/hooks/usePdfJobActions.ts
            frontend/src/features/pdf-builder/submissionReducer.ts
            frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
            frontend/src/features/pdf-builder/hooks/useBatchSubmission.ts
            frontend/src/features/pdf-builder/schemas/builderSchema.ts
            frontend/src/routes/LoginPage.tsx
            frontend/src/routes/WorkspacePage.tsx
            frontend/src/routes/JobsPage.tsx
            frontend/src/routes/JobDetailPage.tsx
            frontend/src/routes/SettingsPage.tsx
            frontend/src/styles/globals.css
            frontend/tests/frontend-utils.test.mjs
            frontend/tests/cancel-pdf-job-logic.test.mjs
            frontend/tests/pdf-job-updates.test.mjs
            frontend/tests/job-status.test.ts
            frontend/tests/submission-reducer.test.ts
            frontend/tests/upload-files.test.ts
            .github/workflows/frontend-ci.yml
            .github/workflows/deploy-pages.yml
            .github/workflows/smoke-supabase-service.yml
          )

          for file in "${required_files[@]}"; do
            test -s "$file"
          done

          removed_files=(
            frontend/src/App.tsx
            frontend/src/app.css
            frontend/src/simple-workspace.css
            frontend/src/pages/PdfBuilderPage.tsx
            frontend/src/hooks/usePdfBuilder.ts
            frontend/src/hooks/usePdfDelivery.ts
            frontend/src/hooks/useGlobalFileDrop.ts
            frontend/src/components/PdfBatchUpload.tsx
            frontend/src/components/PdfUpload.tsx
            frontend/src/components/PdfJobHistory.tsx
            frontend/src/components/PdfJobStatus.tsx
            frontend/src/api/pdfJobs.ts
            frontend/src/types/pdfJob.ts
            frontend/src/types/upload.ts
            frontend/src/utils/pdfThemes.ts
            frontend/src/utils/submissionRecovery.ts
            frontend/src/utils/uploadFiles.ts
            frontend/src/utils/pdfJobStatus.ts
            frontend/src/utils/pdfJobUpdates.ts
          )

          for file in "${removed_files[@]}"; do
            test ! -e "$file"
          done

          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'))
          const lock = JSON.parse(fs.readFileSync('frontend/package-lock.json', 'utf8'))
          const expectedTest = 'node --import tsx --test tests/*.test.*'
          if (pkg.scripts?.test !== expectedTest) {
            throw new Error(`frontend test script must be ${expectedTest}`)
          }
          if (pkg.devDependencies?.wrangler !== '4.110.0') {
            throw new Error('frontend wrangler must be pinned to 4.110.0')
          }
          if (lock.packages?.['']?.devDependencies?.wrangler !== '4.110.0') {
            throw new Error('frontend lockfile must pin wrangler 4.110.0')
          }
          const lockedWrangler = lock.packages?.['node_modules/wrangler']?.version
          if (lockedWrangler !== '4.110.0') {
            throw new Error(`frontend lockfile resolved wrangler ${lockedWrangler || '<missing>'}`)
          }
          NODE

          grep -q "createBrowserRouter" frontend/src/app/router.tsx
          grep -q "QueryClientProvider" frontend/src/app/providers.tsx
          grep -q "persist(" frontend/src/stores/workspaceStore.ts
          grep -q "setQueryData" frontend/src/features/pdf-jobs/hooks/cache.ts
          grep -q "shouldApplyPdfJobUpdate" frontend/src/features/pdf-jobs/hooks/cache.ts
          grep -q "postgres_changes" frontend/src/features/pdf-jobs/hooks/PdfJobsRealtimeBridge.tsx
          grep -q "refetchInterval" frontend/src/features/pdf-jobs/hooks/usePdfJob.ts
          grep -q "submissionReducer" frontend/src/features/pdf-builder/hooks/usePdfSubmission.ts
          grep -q "Math.min(3" frontend/src/features/pdf-builder/hooks/useBatchSubmission.ts
          grep -q "@tailwind base" frontend/src/styles/globals.css

          for workflow in \
            .github/workflows/frontend-ci.yml \
            .github/workflows/deploy-pages.yml \
            .github/workflows/smoke-supabase-service.yml; do
            grep -q 'cache: npm' "$workflow"
            grep -q 'cache-dependency-path: frontend/package-lock.json' "$workflow"
            grep -q 'npm ci' "$workflow"
            if grep -qE 'npm install($| )' "$workflow"; then
              echo "$workflow must use npm ci rather than npm install"
              exit 1
            fi
          done

          grep -q './node_modules/.bin/wrangler' .github/workflows/deploy-pages.yml
          grep -q './node_modules/.bin/wrangler' .github/workflows/smoke-supabase-service.yml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run build

      - name: Validate Supabase Function CORS smoke contract
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run smoke:cors

      - name: Validate authenticated Supabase smoke contract
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: repository-hygiene-placeholder-key
        run: npm run smoke:supabase
