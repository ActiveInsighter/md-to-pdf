name: Install frontend quality dependencies

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/install-frontend-quality-deps.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Mark dependency update pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'frontend-quality-dependencies',
              target_url: runUrl,
              description: 'Installing frontend quality dependencies',
            })

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install quality dependencies
        working-directory: frontend
        run: npm install --save-dev eslint @eslint/js typescript-eslint eslint-plugin-react-hooks eslint-plugin-react-refresh globals prettier --no-audit --no-fund

      - name: Validate clean install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Commit package metadata
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add frontend/package.json frontend/package-lock.json
          if git diff --cached --quiet; then
            echo 'Package metadata already up to date.'
          else
            git commit -m 'chore(frontend): add lint and format dependencies'
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Publish dependency update result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'frontend-quality-dependencies',
              target_url: runUrl,
              description: state === 'success'
                ? 'Frontend quality dependencies installed and validated'
                : 'Frontend quality dependency installation failed',
            })
