name: Validate frontend

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/validate-frontend.yml'
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validate-frontend.yml'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: frontend-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Mark frontend validation pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'frontend-validation',
              target_url: runUrl,
              description: 'Frontend validation is running',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Check frontend formatting
        working-directory: frontend
        run: npm run format:check

      - name: Lint frontend
        id: lint
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-output.txt

      - name: Upload lint diagnostic
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-lint-${{ github.run_id }}
          path: frontend/lint-output.txt
          if-no-files-found: error
          retention-days: 1

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Publish frontend validation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}'
            const state = jobStatus === 'success'
              ? 'success'
              : jobStatus === 'cancelled'
                ? 'error'
                : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            const description = state === 'success'
              ? 'Frontend format, lint, typecheck and build passed'
              : state === 'error'
                ? 'Frontend validation was cancelled'
                : 'Frontend validation failed'

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'frontend-validation',
              target_url: runUrl,
              description,
            })
