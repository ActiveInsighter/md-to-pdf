name: Renderer Regression

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'themes/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/renderer-regression.yml'
      - '.github/workflows/build-pdf.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'themes/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/renderer-regression.yml'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

concurrency:
  group: renderer-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-renderer:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PDF_POSTPROCESS_STRICT: 'true'
      PDF_PREVIEW_DPI: '110'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install fonts and PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          fc-cache -f

      - name: Install dependencies
        run: npm ci

      - name: Locate Chrome
        run: |
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome executable was not found on the runner."
            exit 1
          fi
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Run renderer regression
        run: npm test

      - name: Upload regression output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: renderer-regression
          path: .tmp/render-test/**
          if-no-files-found: error
