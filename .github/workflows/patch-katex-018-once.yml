name: Patch KaTeX 0.18 compatibility once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: patch-katex-018-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'chore/upgrade-dependencies-20260720'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout dependency branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Patch KaTeX tag selectors
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          renderer = Path('scripts/build-pdf.mjs')
          source = renderer.read_text(encoding='utf-8')
          old = "const sourceTag = html?.querySelector(':scope > .tag') || html?.querySelector('.tag');"
          new = "const sourceTag = html?.querySelector(':scope > .tag, :scope > .katex-tag') || html?.querySelector('.tag, .katex-tag');"
          if old not in source and new not in source:
              raise SystemExit('Expected KaTeX source-tag selector was not found')
          renderer.write_text(source.replace(old, new), encoding='utf-8')

          stylesheet = Path('style.css')
          source = stylesheet.read_text(encoding='utf-8')
          old = '.katex-display.katex-display-tagged > .katex-outside-tag > .tag {'
          new = '.katex-display.katex-display-tagged > .katex-outside-tag > :is(.tag, .katex-tag) {'
          if old not in source and new not in source:
              raise SystemExit('Expected relocated-tag selector was not found')
          stylesheet.write_text(source.replace(old, new), encoding='utf-8')
          PY
          node --check scripts/build-pdf.mjs

      - name: Commit compatibility patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/build-pdf.mjs style.css
          if git diff --cached --quiet; then
            echo 'KaTeX compatibility patch is already applied.'
            exit 0
          fi
          git commit -m 'fix(renderer): support KaTeX 0.18 equation tags'
          git push origin HEAD:${{ github.head_ref }}
