name: Validate workflow security

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'scripts/validate-workflow-*.mjs'
      - 'scripts/test-validate-workflow-*.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Test workflow security validators
        shell: bash
        run: |
          set -o pipefail
          npm run test:workflows 2>&1 | tee workflow-tests.log

      - name: Validate every workflow
        shell: bash
        run: |
          set -o pipefail
          npm run validate:workflows 2>&1 | tee workflow-validation.log

      - name: Upload workflow validation diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: workflow-validation-${{ github.run_id }}
          path: |
            workflow-tests.log
            workflow-validation.log
          if-no-files-found: warn
          retention-days: 3
