name: Validate workflow security

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'scripts/validate-workflow-*.mjs'
      - 'scripts/test-validate-workflow-*.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Test workflow security validators
        shell: bash
        run: |
          set -euo pipefail
          npm run test:workflows 2>&1 | tee workflow-tests.log

      - name: Validate every workflow
        shell: bash
        run: |
          set -euo pipefail
          npm run validate:workflows 2>&1 | tee workflow-validation.log

      - name: Upload workflow validation diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflow-validation-${{ github.run_id }}
          path: |
            workflow-tests.log
            workflow-validation.log
          if-no-files-found: warn
          retention-days: 3
