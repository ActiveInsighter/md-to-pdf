name: Validate workflow security

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'scripts/validate-workflow-*.mjs'
      - 'scripts/test-validate-workflow-*.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Test workflow security validators
        run: npm run test:workflows

      - name: Validate every workflow
        run: npm run validate:workflows
