name: Install JSX accessibility lint dependency

on:
  push:
    branches:
      - 'agent/repository-hygiene-smoke-command'
    paths:
      - '.github/workflows/install-jsx-a11y.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  install:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Mark dependency installation pending
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'jsx-a11y-dependency',
              target_url: runUrl,
              description: 'Installing JSX accessibility lint dependency',
            })

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install JSX accessibility lint dependency
        working-directory: frontend
        run: npm install --save-dev eslint-plugin-jsx-a11y@latest --no-audit --no-fund

      - name: Verify clean install
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm ls eslint-plugin-jsx-a11y

      - name: Commit package metadata
        run: |
          if git diff --quiet -- frontend/package.json frontend/package-lock.json; then
            echo 'No dependency metadata changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add frontend/package.json frontend/package-lock.json
          git commit -m 'build(frontend): add JSX accessibility lint plugin'
          git push

      - name: Publish dependency installation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'jsx-a11y-dependency',
              target_url: runUrl,
              description: state === 'success'
                ? 'JSX accessibility lint dependency installed'
                : 'JSX accessibility lint dependency installation failed',
            })