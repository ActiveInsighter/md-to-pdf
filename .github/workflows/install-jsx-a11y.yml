name: Cleanup temporary JSX accessibility installer

on:
  push:
    branches:
      - 'agent/repository-hygiene-smoke-command'
    paths:
      - '.github/workflows/install-jsx-a11y.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Remove temporary workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/install-jsx-a11y.yml
          git commit -m 'chore(ci): remove temporary JSX accessibility installer'
          git push
